type: fleet
name: parakeet-dev-fleet

# Use only runpod backend
backends: [runpod]

# Prefer EU region
regions: [eur-is-1]

# Fixed single instance (no auto-scaling)
nodes: 1

# Deprovision instance if idle for 1 hour
idle_duration: 1h

resources:
  # 16GB GPU (enough for Parakeet TDT 0.6B fp16)
  gpu:
    memory: 16GB..24GB
    count: 1
  memory: 16GB..
  disk: 50GB
