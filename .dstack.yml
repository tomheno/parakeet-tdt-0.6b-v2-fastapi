type: service

# Service name
name: parakeet-streaming-stt

# Pre-built Docker image from Docker Hub
# YOU MUST build and push this image first!
# Build: docker buildx build --platform linux/amd64 -f Dockerfile.gpu -t tomheno/parakeet-streaming-stt:latest --push .
image: tomheno/parakeet-streaming-stt:latest

# Required: port the application listens on
port: 8000

# Environment variables
env:
  - MODEL_PRECISION=fp16
  - DEVICE=cuda
  - LOG_LEVEL=INFO

# GPU requirements
resources:
  gpu:
    memory: 16GB
    count: 1
  memory: 16GB
  disk: 50GB

# Scaling configuration (optional)
replicas: 1..10
scaling:
  metric: rps
  target: 10
