type: dev-environment
name: parakeet-dev

ide: vscode

# Use pre-built Docker image with all dependencies from Docker Hub
# Build and push first: ./build-dev-image.sh latest
image: tomheno/parakeet-dev:latest

# For private images, uncomment and add your Docker Hub credentials:
# registry_auth:
#   username: tomheno
#   password: ${{ env.DOCKER_PASSWORD }}

# Use fleet for cost optimization
fleets:
  - parakeet-dev-fleet

# Environment variables
env:
  - MODEL_PRECISION=fp16
  - DEVICE=cuda
  - LOG_LEVEL=INFO

# GPU resources
resources:
  gpu:
    memory: 16GB
    count: 1
  shm_size: 8GB
  disk:
    size: 50GB

# Cost limit
max_price: 1.00

# Spot instances for cost savings
spot_policy: auto

# Auto-retry on interruption
retry:
  on_events: [no-capacity, interruption]
  duration: 30m

# Auto-stop if GPU utilization stays below 5% for 1 hour
utilization_policy:
  min_gpu_utilization: 5
  time_window: 1h

# Auto-stop after 2 hours of inactivity
inactivity_duration: 2h

# Working directory
working_dir: /workspace

# Mount local repository to /workspace
repos:
  - .:/workspace

# Optional: Mount volume for model cache
# volumes:
#   - name: parakeet-models
#     path: /models

# Initialization commands (minimal since image has dependencies)
init:
  # Verify installation
  - uv run python -c 'import torch; print("PyTorch version:", torch.__version__, "CUDA available:", torch.cuda.is_available())'
  - uv run python -c 'import nemo; print("NeMo installed")'
  - echo "Dev environment ready! Start server with: uv run uvicorn parakeet_service.main:app --host 0.0.0.0 --port 8000 --reload"
