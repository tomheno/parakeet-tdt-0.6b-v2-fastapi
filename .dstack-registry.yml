type: service

# Service name
name: parakeet-streaming-stt-registry

# Use pre-built image from registry
# Replace with your registry URL after building and pushing
image: ghcr.io/tomheno/parakeet-streaming-stt:latest
# Or Docker Hub: docker.io/yourusername/parakeet-streaming-stt:latest

# Required port field
port: 8000

# Environment variables
env:
  - MODEL_PRECISION=fp16
  - DEVICE=cuda
  - LOG_LEVEL=INFO

# GPU requirements
resources:
  gpu:
    memory: 16GB
    count: 1
  memory: 16GB
  disk: 50GB

# Scaling configuration
replicas: 1..10
scaling:
  metric: rps
  target: 10
