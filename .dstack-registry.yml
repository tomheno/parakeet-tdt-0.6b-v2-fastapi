type: service

# Service name
name: parakeet-streaming-stt-registry

# Use pre-built image from Docker Hub
# Build and push first: docker buildx build --platform linux/amd64 -f Dockerfile.gpu -t tomheno/parakeet-streaming-stt:latest --push .
image: tomheno/parakeet-streaming-stt:latest

# Required port field
port: 8000

# Environment variables
env:
  - MODEL_PRECISION=fp16
  - DEVICE=cuda
  - LOG_LEVEL=INFO

# GPU requirements
resources:
  gpu:
    memory: 16GB
    count: 1
  memory: 16GB
  disk: 50GB

# Scaling configuration
replicas: 1..10
scaling:
  metric: rps
  target: 10
