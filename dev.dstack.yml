type: dev-environment
name: parakeet-dev

# Use Python 3.11 with NVCC for CUDA support
python: "3.11"
nvcc: true

ide: vscode

# Initialize environment with UV and dependencies
init:
  # Install UV (fast Python package manager)
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - export PATH="/root/.cargo/bin:$PATH"

  # Sync all dependencies using UV
  - uv sync --all-extras

  # Verify installation
  - uv run python -c "import torch; print(f'PyTorch {torch.__version__}, CUDA available: {torch.cuda.is_available()}')"
  - uv run python -c "import nemo; print(f'NeMo {nemo.__version__}')"

# Environment variables
env:
  - MODEL_PRECISION=fp16
  - DEVICE=cuda
  - LOG_LEVEL=INFO

# GPU resources (16GB is enough for Parakeet TDT 0.6B)
resources:
  gpu:
    memory: 16GB
    count: 1
  memory: 16GB..
  disk: 50GB

# Use spot instances to save costs
spot_policy: auto

# Retry if interrupted or no capacity
retry:
  on_events: [no-capacity, interruption]
  duration: 30m

# Auto-stop after 2 hours of inactivity
inactivity_duration: 2h

# Mount local repository to /workflow
repos:
  - .
